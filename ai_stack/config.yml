model_list:
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: claude-3-5-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20240620
      api_key: os.environ/ANTHROPIC_API_KEY

litellm_settings:
  telemetry: False
  success_callbacks: ["langfuse"]
  failure_callbacks: ["langfuse"] # Opcional: Registra no Langfuse quando a API da OpenAI/Anthropic cai
