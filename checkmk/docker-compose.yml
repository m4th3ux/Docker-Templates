services:
    monitoring:
        image: checkmk/check-mk-community:2.5.0p9
        container_name: monitoring
        ports:
            - 8090:5000
            - 8000:8000
        volumes:
            - checkmk:/omd/sites
            - /etc/localtime:/etc/localtime:ro
        restart: always
        stdin_open: true
        tty: true
volumes:
    checkmk:
        external: true
